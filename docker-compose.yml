version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3005:3005"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3005
    volumes:
      - baileys_sessions:/app/auth_sessions_v2
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  baileys_sessions:
